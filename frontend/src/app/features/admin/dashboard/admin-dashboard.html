<app-navbar></app-navbar>

<main class="dashboard-wrapper container">
  <div class="dashboard-header-row">
    <h1 class="dashboard-title">Admin Dashboard</h1>
    <button (click)="onLogout()" class="btn btn-secondary btn-sm">Log out</button>
  </div>
  
  <div class="glass-card info-card">
    <h3>Active Session Info</h3>
    <p class="session-detail"><strong>User Email:</strong> {{ getUserEmail() }}</p>
    <p class="session-detail"><strong>Role Scope:</strong> ROLE_ADMIN</p>
    <p class="session-note">
      Welcome to the Admin Command Center! You have systemic authorization to manage company approvals, verify recruiters, and monitor backend database search logs.
    </p>
  </div>
</main>

<app-footer></app-footer>
