<div class="auth-wrapper">
  <div class="auth-card text-center">
    <div class="brand-logo"><a href="/">NEXUS</a></div>
    
    <div class="verify-state">
      <div class="icon-circle icon-circle-error">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
      </div>
      <h2 class="auth-title">Access Denied</h2>
      <p class="auth-subtitle">
        You do not have the required permissions to access this page. Your account role does not match this area.
      </p>
      
      <div class="action-grid">
        <a [routerLink]="getHomeRoute()" class="btn btn-primary btn-block btn-margin">
          {{ isLoggedIn() ? 'Go to My Dashboard' : 'Return Home' }}
        </a>
        <a routerLink="/login" class="btn btn-secondary btn-block">Log in with another account</a>
      </div>
    </div>
  </div>
</div>
