<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="brand-logo"><a href="/">NEXUS</a></div>
      <h2 class="auth-title">Forgot Password</h2>
      <p class="auth-subtitle">Enter your email and we'll send you an OTP to reset your password.</p>
    </div>

    <!-- Success & Error Banners -->
    <div *ngIf="successMessage()" class="alert alert-success">
      {{ successMessage() }}
    </div>
    <div *ngIf="errorMessage()" class="alert alert-error">
      {{ errorMessage() }}
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="auth-form">
      <!-- Email Input -->
      <div class="form-group" [ngClass]="{'has-error': forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid}">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" formControlName="email" placeholder="you@example.com" class="form-input" autocomplete="email">
        <span *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.errors?.['required']" class="error-msg">Email is required</span>
        <span *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.errors?.['email']" class="error-msg">Please enter a valid email</span>
      </div>

      <!-- Submit Button -->
      <button type="submit" [disabled]="forgotForm.invalid || isLoading()" class="btn btn-primary btn-block">
        <span *ngIf="!isLoading()">Send Reset Code</span>
        <span *ngIf="isLoading()" class="spinner-inline"></span>
      </button>
    </form>

    <div class="auth-footer">
      Remember password? <a routerLink="/login" class="auth-link">Log in</a>
    </div>
  </div>
</div>
