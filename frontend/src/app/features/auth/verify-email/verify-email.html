<div class="auth-wrapper">
  <div class="auth-card text-center">
    <div class="brand-logo"><a href="/">NEXUS</a></div>
    
    <!-- 1. Verifying State -->
    <div *ngIf="status() === 'verifying'" class="verify-state">
      <div class="spinner-large"></div>
      <h2 class="auth-title">Verifying...</h2>
      <p class="auth-subtitle">{{ message() }}</p>
    </div>

    <!-- 2. Success State -->
    <div *ngIf="status() === 'success'" class="verify-state">
      <div class="icon-circle icon-circle-success">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
      <h2 class="auth-title">Email Verified!</h2>
      <p class="auth-subtitle">{{ message() }}</p>
      <a routerLink="/login" class="btn btn-primary btn-block btn-margin">Proceed to Login</a>
    </div>

    <!-- 3. Error State -->
    <div *ngIf="status() === 'error'" class="verify-state">
      <div class="icon-circle icon-circle-error">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </div>
      <h2 class="auth-title">Verification Failed</h2>
      <p class="auth-subtitle">{{ message() }}</p>
      <a routerLink="/register" class="btn btn-primary btn-block btn-margin">Return to Registration</a>
    </div>
  </div>
</div>
