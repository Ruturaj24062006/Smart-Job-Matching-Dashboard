<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="brand-logo"><a href="/">NEXUS</a></div>
      <h2 class="auth-title">Reset Password</h2>
      <p class="auth-subtitle">Verify your OTP code and set your new credentials.</p>
    </div>

    <!-- Success & Error Banners -->
    <div *ngIf="successMessage()" class="alert alert-success">
      {{ successMessage() }}
    </div>
    <div *ngIf="errorMessage()" class="alert alert-error">
      {{ errorMessage() }}
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="auth-form">
      <!-- Email Input -->
      <div class="form-group" [ngClass]="{'has-error': resetForm.get('email')?.touched && resetForm.get('email')?.invalid}">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" formControlName="email" placeholder="you@example.com" class="form-input" autocomplete="email">
        <span *ngIf="resetForm.get('email')?.touched && resetForm.get('email')?.errors?.['required']" class="error-msg">Email is required</span>
        <span *ngIf="resetForm.get('email')?.touched && resetForm.get('email')?.errors?.['email']" class="error-msg">Please enter a valid email</span>
      </div>

      <!-- OTP Input -->
      <div class="form-group" [ngClass]="{'has-error': resetForm.get('otp')?.touched && resetForm.get('otp')?.invalid}">
        <label for="otp" class="form-label">OTP Verification Code</label>
        <input type="text" id="otp" formControlName="otp" placeholder="Enter OTP code" class="form-input" autocomplete="one-time-code">
        <span *ngIf="resetForm.get('otp')?.touched && resetForm.get('otp')?.errors?.['required']" class="error-msg">OTP code is required</span>
      </div>

      <!-- New Password Input -->
      <div class="form-group" [ngClass]="{'has-error': resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.invalid}">
        <label for="newPassword" class="form-label">New Password</label>
        <input type="password" id="newPassword" formControlName="newPassword" placeholder="Min. 6 characters" class="form-input" autocomplete="new-password">
        <span *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.errors?.['required']" class="error-msg">New password is required</span>
        <span *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.errors?.['minlength']" class="error-msg">Must be at least 6 characters</span>
      </div>

      <!-- Submit Button -->
      <button type="submit" [disabled]="resetForm.invalid || isLoading()" class="btn btn-primary btn-block">
        <span *ngIf="!isLoading()">Update Password</span>
        <span *ngIf="isLoading()" class="spinner-inline"></span>
      </button>
    </form>

    <div class="auth-footer">
      Back to <a routerLink="/login" class="auth-link">Log in</a>
    </div>
  </div>
</div>
